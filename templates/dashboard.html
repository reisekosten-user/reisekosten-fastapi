<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body>

<h1>Reisekosten Dashboard</h1>

<input id="api" value="" style="width:400px"><br><br>

<textarea id="text" style="width:400px;height:200px"></textarea><br>

<button onclick="send()">Analyse</button>

<pre id="out"></pre>

<script>
window.onload = () => {
  document.getElementById("api").value = window.location.origin;
}

async function send(){
  let api = document.getElementById("api").value;
  let text = document.getElementById("text").value;

  let res = await fetch(api+"/analyze/text",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  let t = await res.text();

  try{
    document.getElementById("out").innerText =
      JSON.stringify(JSON.parse(t),null,2);
  }catch{
    document.getElementById("out").innerText = t;
  }
}
</script>

</body>
</html>
