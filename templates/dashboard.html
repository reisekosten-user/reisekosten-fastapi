<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Reisekosten Dashboard</title>
<style>
body{font-family:Arial;margin:0;background:#f5f7fa}
.header{background:#1e3a8a;color:#fff;padding:10px 20px;font-size:20px;cursor:pointer}
.container{padding:20px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
th{background:#e5e7eb}
.btn{padding:5px 10px;margin:2px;border:none;border-radius:4px;cursor:pointer}
.edit{background:#3b82f6;color:#fff}
.delete{background:#ef4444;color:#fff}
.beleg{background:#10b981;color:#fff}
</style>
</head>
<body>
<div class="header" onclick="goDashboard()">Reisekosten System</div>
<div class="container">
<h2>Reise Details</h2>
<div id="reiseInfo"></div>
<table>
<thead>
<tr>
<th>Art</th>
<th>Datum</th>
<th>Details</th>
<th>Status</th>
<th>Beleg</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="eventsTable"></tbody>
</table>
</div>

<script>
const api = "";
const params = new URLSearchParams(window.location.search);
const reiseId = params.get("reise_id") || 1;

function goDashboard(){ window.location.href = "/dashboard" }

async function load(){
  const res = await fetch(api+"/reisen/"+reiseId);
  const data = await res.json();

  document.getElementById("reiseInfo").innerHTML = `
    <b>${data.reise_code} · ${data.reise_name}</b><br>
    ${data.startdatum} bis ${data.enddatum}
  `;

  const tbody = document.getElementById("eventsTable");
  tbody.innerHTML = "";

  for(const ev of data.events){
    const ed = await fetch(api+"/events/"+ev.id).then(r=>r.json());

    let details = "";

    if(ed.belege.length > 0){
      const b = ed.belege[0];
      const a = JSON.parse(b.analysis_json || "{}");

      if(a.art_des_dokuments === "Flug"){
        details = a.reisesegmente.map(s =>
          `${s.abreise_ort} ${s.abreise_datum_und_zeit} → ${s.ankunft_ort} ${s.ankunft_datum_und_zeit}`
        ).join("<br>");
      }
      else if(a.art_des_dokuments === "Hotel"){
        details = `Check-in: ${a.reisesegmente?.[0]?.abreise_datum_und_zeit || ""}<br>
                   Check-out: ${a.reisesegmente?.[0]?.ankunft_datum_und_zeit || ""}`;
      }
    }

    const belegBtn = ed.beleg_pdf_urls.length
      ? `<button class='btn beleg' onclick='openPdf(${ed.beleg_pdf_urls[0].beleg_id})'>Beleg</button>`
      : "-";

    const row = `
      <tr>
        <td>${ev.typ}</td>
        <td>${ev.created_at?.slice(0,10)}</td>
        <td>${details || "-"}</td>
        <td>${ev.status}</td>
        <td>${belegBtn}</td>
        <td>
          <button class='btn edit'>✏️</button>
          <button class='btn delete' onclick='del(${ev.id})'>❌</button>
        </td>
      </tr>
    `;

    tbody.innerHTML += row;
  }
}

function openPdf(id){
  window.open(`/belege/${id}/pdf`,"_blank");
}

async function del(id){
  if(!confirm("wirklich löschen?")) return;
  await fetch(`/events/${id}`,{method:"DELETE"});
  load();
}

load();
</script>
</body>
</html>
