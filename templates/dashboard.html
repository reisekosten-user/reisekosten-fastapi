<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Reisekosten Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f7fa;
        }

        header {
            background: #0a2a66;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
        }

        header img {
            height: 60px;
            margin-right: 20px;
        }

        .container {
            padding: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td, th {
            border: 1px solid #ccc;
            padding: 5px;
        }

        .box {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <img src="/static/logo2.png">
    <h2>Reisekosten System</h2>
</header>

<div class="container">

    <div class="box">
        <h3>Neue Reise</h3>

        Jahr:
        <input id="jahr" value="2026">

        Name:
        <input id="name" value="Testreise">

        <button onclick="createReise()">Anlegen</button>
    </div>

    <div class="box">
        <h3>Analyse starten</h3>

        Datei:
        <input id="filename" value="test.txt">

        <textarea id="text"></textarea>

        <button onclick="analyze()">Analyse starten</button>
    </div>

    <div class="box">
        <h3>Reisen Übersicht</h3>
        <button onclick="loadReisen()">Neu laden</button>

        <table id="reisenTable"></table>
    </div>

    <div class="box">
        <h3>Letztes Ergebnis</h3>
        <pre id="result"></pre>
    </div>

</div>

<script>

const API = "";


async function createReise() {

    const data = {
        reise_jahr: parseInt(document.getElementById("jahr").value),
        reise_name: document.getElementById("name").value,
        anzahl_reisende: 1,
        mitarbeiter_ids: []
    };

    const res = await fetch(API + "/reisen", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const json = await res.json();
    document.getElementById("result").innerText = JSON.stringify(json, null, 2);

    loadReisen();
}


async function loadReisen() {

    const res = await fetch(API + "/reisen/overview");
    const json = await res.json();

    let html = `
        <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Status</th>
        </tr>
    `;

    json.reisen.forEach(r => {
        html += `
            <tr>
                <td>${r.id}</td>
                <td>${r.reise_code}</td>
                <td>${r.reise_name}</td>
                <td>${r.status}</td>
            </tr>
        `;
    });

    document.getElementById("reisenTable").innerHTML = html;
}


async function analyze() {

    const data = {
        text: document.getElementById("text").value,
        filename: document.getElementById("filename").value,
        reise_id: 1
    };

    const res = await fetch(API + "/analyze/text", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const json = await res.json();

    document.getElementById("result").innerText =
        JSON.stringify(json, null, 2);

    loadReisen();
}

</script>

</body>
</html>
